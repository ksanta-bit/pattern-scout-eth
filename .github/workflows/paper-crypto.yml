name: Pattern Scout — Paper Crypto (ETH)

# Runs the strategy in PAPER mode on real Binance/Bitget data every 5 minutes,
# keeps a cumulative trade log in the repo, and publishes the dashboard to GitHub Pages.
#
# Notes / caveats:
# - GitHub cron granularity is 5 min and scheduled runs can be delayed under load.
# - Scheduled workflows are auto-disabled after 60 days without repo activity.
# - This is PAPER trading (simulated fills). No exchange key is used or needed.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      reset:
        description: "Azzera lo storico e riparti da 100 USDT"
        type: boolean
        default: false
      daily_filter:
        description: "Filtro daily (breakout+retest)"
        type: choice
        options: ["keep", "on", "off"]
        default: "keep"
      leverage:
        description: "Leva massima (rischio auto in funzione della leva)"
        type: choice
        options: ["keep", "5", "10", "20", "50", "100"]
        default: "keep"
      risk:
        description: "Rischio per trade"
        type: choice
        options: ["keep", "0.005", "0.01", "0.02", "0.03"]
        default: "keep"
      session:
        description: "Sessioni (ancoraggi)"
        type: choice
        options: ["keep", "daily", "three", "us"]
        default: "keep"
      symbols:
        description: "Simboli (lista separata da virgola, es. ETHUSDT,BTCUSDT,SOLUSDT)"
        type: string
        default: "keep"

concurrency:
  group: paper-crypto
  cancel-in-progress: false

permissions:
  contents: write   # to commit the cumulative state
  pages: write      # to publish the dashboard
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Apply dashboard settings (on manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          IN_LEV: ${{ inputs.leverage }}
          IN_FILTER: ${{ inputs.daily_filter }}
          IN_RISK: ${{ inputs.risk }}
          IN_SESSION: ${{ inputs.session }}
          IN_SYMBOLS: ${{ inputs.symbols }}
        run: python scripts/apply_settings.py

      - name: Run one paper pass
        env:
          PYTHONPATH: src
        run: |
          python -m pattern_scout.cli paper-crypto \
            --ci \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.reset) && '--reset' || '' }} \
            --symbols ETHUSDT,BTCUSDT,SOLUSDT \
            --exchange "binancevision,bitget" \
            --config config.crypto.json \
            --settings bot_settings.json \
            --lookback-days 20 \
            --out docs \
            --cumulative reports/crypto_ci/cumulative.json

      - name: Commit cumulative state
        run: |
          git config user.name "pattern-scout-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/crypto_ci/cumulative.json docs/ bot_settings.json || true
          git commit -m "paper: update $(date -u +'%Y-%m-%dT%H:%MZ')" || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
